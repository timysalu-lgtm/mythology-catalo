<!DOCTYPE html>
<html>
<head>
  <title>Mythology Catalog</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">

  <div class="topbar">
    <div>
      <span class="label">PANTHEON:</span>
      <span class="icons">⚡ 🌊 🌿 🔥 🏛️</span>
    </div>
      
    <div>
      <span class="label">ROLES:</span>
      <span class="icons">🛡️ ⚔️ 👑 🌙</span>
    </div>

    <input type="text" id="search" placeholder="Search Gods...">
    
  </div>


</div>

  <h1> Mythology Catalog </h1>
  <p>Exploring gods, spirits, and legends.</p>

 <div class="card">
  <h2>Yoruba Mythology</h2>
  <p>Orisha, Aṣè, and sacred traditions.</p>
  <a href="yoruba/index.html">Explore</a>
</div>

  <div class="card">
    <h2>Greek Mythology</h2>
    <p>Olympians, Titans, and heroes.</p>
    <a href="gree/index.html">Explore</a>
  </div>

  <div class="card">
    <h2>Norse Mythology</h2>
    <p>Æsir, giants, and Ragnarok.</p>
     <a href="norse/index.html">Explore</a>
  </div>

<script>
  const search = document.getElementById("search");

  search.addEventListener("keyup", function () {
    const value = search.value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
      const text = card.innerText.toLowerCase();

      if (text.includes(value)) {
        card.style.display = " ";
      } else {
        card.style.display = "none";
      }
    });
  });
</script>

</body>
</html>
